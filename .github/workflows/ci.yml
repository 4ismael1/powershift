name: Windows CI

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: powershift-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    name: Verify and package
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy --no-self-update
          rustup show active-toolchain

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Verify version consistency
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-version.ps1

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust with warnings denied
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Test frontend
        run: npm test

      - name: Audit JavaScript dependencies
        run: npm audit --audit-level=high

      - name: Audit Rust dependencies
        shell: pwsh
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit -D warnings

      - name: Build installer
        run: npm run tauri -- build

      - name: Upload unsigned installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: powershift-unsigned-windows-installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
