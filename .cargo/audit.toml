[advisories]
# Tauri's cross-platform lockfile still contains GTK3 packages, but the
# Windows target graph does not compile them. These advisories are retained as
# explicit, reviewable exceptions so every new RustSec warning fails CI.
ignore = [
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  "RUSTSEC-2024-0429",
  "RUSTSEC-2024-0370",
  # urlpattern is a transitive Tauri dependency. The UNIC notices are
  # maintenance-status advisories, not known vulnerabilities or unsoundness.
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
]
informational_warnings = ["unmaintained", "unsound"]

[output]
deny = ["warnings"]
format = "terminal"
quiet = false
show_tree = true

[target]
arch = ["x86_64"]
os = ["windows"]

[yanked]
enabled = true
update_index = true
